<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reading Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d14;
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
    }

    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 9.5px;
      color: rgba(255,255,255,0.28);
      margin-top: 1px;
    }

    /* ── Body ── */
    .body { padding: 14px 16px; }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 7px;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      padding: 8px 11px;
      outline: none;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus {
      border-color: rgba(124,58,237,0.5);
      background: rgba(124,58,237,0.06);
    }

    .sub {
      font-size: 9.5px;
      color: rgba(255,255,255,0.2);
      margin-top: 6px;
    }

    .sub a {
      color: rgba(124,58,237,0.7);
      text-decoration: none;
    }

    .sub a:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: linear-gradient(135deg, rgba(124,58,237,0.7), rgba(79,70,229,0.7));
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 9px;
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    .status {
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 11px;
      display: none;
      text-align: center;
    }

    .status.success {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: #6ee7b7;
      display: block;
    }

    .status.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      display: block;
    }

    /* ── Shortcuts ── */
    .shortcuts {
      padding: 11px 16px 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .shortcuts .field-label { margin-bottom: 8px; }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .shortcut-row:last-child { margin-bottom: 0; }

    .kbd {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 9.5px;
      font-family: 'Consolas', monospace;
      color: rgba(167,139,250,0.8);
      white-space: nowrap;
    }

    .shortcut-desc {
      font-size: 10px;
      color: rgba(255,255,255,0.28);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">✦</div>
      <div class="header-text">
        <h1>Reading Tools</h1>
        <p>Powered by Groq · LLaMA 3.3 70B</p>
      </div>
    </div>

    <div class="body">
      <div class="field-label">Groq API Key</div>
      <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off" />
      <p class="sub">Free at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
      <button class="btn" id="saveBtn">Save</button>
      <div class="status" id="status"></div>
    </div>

    <div class="shortcuts">
      <div class="field-label">Shortcuts</div>
      <div class="shortcut-row">
        <span class="kbd">Ctrl+Shift+Y</span>
        <span class="shortcut-desc">Toggle panel</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">Esc</span>
        <span class="shortcut-desc">Instant close</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">/summarize</span>
        <span class="shortcut-desc">Summarize page</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">/search</span>
        <span class="shortcut-desc">Search the web</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
