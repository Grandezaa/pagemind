<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reading Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: transparent;
      color: rgba(255,255,255,0.82);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
    }

    .wrap {
      background: rgba(12, 10, 28, 0.55);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(167,139,250,0.5);
      flex-shrink: 0;
    }

    .title {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 5px;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 11.5px;
      padding: 7px 10px;
      outline: none;
      font-family: 'Consolas', monospace;
      transition: border-color 0.2s;
    }

    input:focus { border-color: rgba(167,139,250,0.35); }

    .hint {
      font-size: 9.5px;
      color: rgba(255,255,255,0.22);
      margin-top: 5px;
      line-height: 1.5;
    }

    .hint a { color: rgba(167,139,250,0.5); text-decoration: none; }

    .btn {
      width: 100%;
      margin-top: 10px;
      background: rgba(124,58,237,0.25);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 8px;
      color: rgba(255,255,255,0.75);
      font-size: 11.5px;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: rgba(124,58,237,0.38); }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 11px 0;
    }

    .status {
      margin-top: 8px;
      padding: 6px 9px;
      border-radius: 7px;
      font-size: 10.5px;
      display: none;
    }

    .status.success {
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.18);
      color: rgba(110,231,183,0.85);
      display: block;
    }

    .status.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.18);
      color: rgba(252,165,165,0.85);
      display: block;
    }

    .shortcuts {
      font-size: 9.5px;
      color: rgba(255,255,255,0.2);
      line-height: 1.8;
    }

    .shortcuts b { color: rgba(167,139,250,0.4); font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="dot"></div>
      <span class="title">Reading Tools</span>
    </div>

    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
    <p class="hint">
      Free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
    </p>

    <button class="btn" id="saveBtn">Save</button>
    <div class="status" id="status"></div>

    <hr class="divider">

    <div class="shortcuts">
      <b>Ctrl+Shift+Y</b> toggle · <b>Esc</b> close<br>
      <b>/summarize</b> · <b>/search</b> [query]<br>
      Select text + shortcut to explain
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
